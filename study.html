addTopic({id:'sysdesign',icon:'🏗️',name:'System Design',color:'#ff7b72',cards:[
{id:'sd01',title:'1. Interview Framework (5 Steps)',
q:'What are the 5 steps of a system design interview? How long for each?',
hint:'Clarify → Scale → High-Level → Deep Dive → Trade-offs. (5+5+10+15+10 min)',
answer:'Step 1 — Clarify Requirements (5 min)\n  Functional: 3-5 core features. Non-functional: scale, latency, consistency, availability.\n  Explicitly name what you are NOT building.\n\nStep 2 — Estimate Scale (5 min)\n  DAU → QPS → storage/year → bandwidth\n\nStep 3 — High-Level Design (10 min)\n  client → LB → API servers → cache → DB\n  Identify: read vs write heavy, sync vs async\n\nStep 4 — Deep Dive (15 min)\n  Interviewer picks 1-2 components: data model, algorithm, bottleneck, failure mode\n\nStep 5 — Trade-offs (10 min)\n  Present options: "X gives A but costs B"\n  Address: SPOF, hot spots, consistency windows, scale-up path',
code:'Scale estimation template:\n  Users: 100M DAU\n  Reads: 10 req/user/day → 100M*10/86400 ≈ 12K QPS\n  Writes: 1/10 reads → 1.2K QPS\n  Storage: 1K/post → 1.2K*86400*365 ≈ 38 TB/year\n  Bandwidth: 12K QPS * 1KB ≈ 12 MB/s',loci:null},
{id:'sd02',title:'2. Numbers Every Engineer Must Know',
q:'RAM vs SSD vs disk speed order of magnitude?\nHow fast is Redis? How many QPS can a single MySQL handle?',
hint:'RAM 1000× faster than SSD. SSD 1000× faster than disk. Redis 100K+ ops/sec. MySQL 5K-20K QPS with indexes.',
answer:'Latency:\n  L1 cache: 0.5 ns\n  L2 cache: 7 ns\n  RAM: 100 ns\n  SSD random read: 150 μs\n  HDD seek: 10 ms\n  Network same datacenter: 500 μs\n  Network cross-region: 150 ms\n  Rule: RAM 1000× faster than SSD; SSD 1000× faster than disk.\n\nThroughput:\n  Single server: 10K-50K QPS\n  Redis: 100K+ ops/sec\n  MySQL (with indexes): 5K-20K QPS\n  Kafka: 1M msg/sec per partition\n\nStorage:\n  1 KB = tweet/user record\n  1 MB = 1 photo\n  1 TB = 1M photos',
code:'Storage quick math:\n  1M users × 1KB = 1 GB\n  1B users × 1KB = 1 TB\n  100M messages/day × 100B = 10 GB/day = 3.6 TB/year\n  Bandwidth = QPS × payload_size\n  100K QPS × 1KB = 100 MB/s ≈ 1 Gbps',loci:null},
{id:'sd03',title:'3. Caching Patterns',
q:'What are the four cache patterns? Which is most common?\nWhat is the thundering herd problem and how do you fix it?',
hint:'Cache-aside (lazy) is most common. Write to DB, invalidate cache (DEL, not SET). Thundering herd: many simultaneous cache misses → DB overload.',
answer:'Cache-aside (lazy, most common):\n  Read: check cache → miss → query DB → populate cache\n  Write: write to DB → DEL cache key (invalidate, not update — avoids race)\n\nWrite-through: write to DB AND cache atomically → strong consistency, extra write latency\n\nWrite-back: write to cache, async flush to DB → risk of data loss\n\nRead-through: cache fetches from DB on miss (cache layer handles it)\n\nThundering herd: cache expires → 1000 requests all miss → DB overloaded.\nFixes:\n  1. Mutex: first miss gets lock, others wait/serve stale\n  2. Probabilistic early expiry: re-fetch slightly before TTL\n  3. Background async refresh\n\nHot key: one key gets 10× traffic → local in-process LRU + key splitting + jittered TTL',
code:'// Cache-aside\nString get(String key){\n    String val=redis.GET(key);\n    if(val!=null) return val;\n    val=db.query(key);\n    redis.SET(key,val,EX,3600);\n    return val;\n}\nvoid write(String key,String val){\n    db.write(key,val);\n    redis.DEL(key);  // invalidate, not update\n}',loci:null},
{id:'sd04',title:'4. Database Selection',
q:'When do you choose SQL vs each NoSQL option?\nHow do you scale SQL horizontally?',
hint:'ACID/joins → SQL. Document/flexible schema → MongoDB. Key-value/fast lookup → Redis/DynamoDB. Wide column/write-heavy → Cassandra. Graph → Neo4j.',
answer:'Decision tree:\n  Need ACID transactions? → SQL (PostgreSQL, MySQL)\n  Document (flexible schema, nested) → MongoDB\n  Key-value (simple lookup, high QPS) → Redis, DynamoDB\n  Wide column (time-series, write-heavy) → Cassandra, HBase\n  Graph (social networks) → Neo4j\n  Full-text search → Elasticsearch\n\nScaling SQL:\n  1. Read replicas → scale reads\n  2. Vertical scaling → bigger machine\n  3. Sharding → scale writes\n    Range-based: user_id range → hot spots\n    Hash-based: hash(user_id) % N → even distribution\n    Directory-based: lookup table → flexible\n\nSharding pitfalls: cross-shard joins, cross-shard transactions, resharding.',
code:'// Sharding key choice matters:\n// Bad: shard by date → all writes hit today\'s shard\n// Good: shard by hash(user_id) → even distribution\n// Key: shard_id = CRC32(user_id) % num_shards\n//\n// Consistent hashing: virtual nodes on ring\n// Add/remove server → only 1/N keys remapped',loci:null},
{id:'sd05',title:'5. Kafka / Message Queue',
q:'Kafka topic, partition, consumer group — what is each?\nAt-least-once vs exactly-once: trade-off?',
hint:'Partition = unit of parallelism. One consumer per partition per group. At-least-once = idempotent consumers. Exactly-once = higher latency.',
answer:'Kafka concepts:\n  Topic: logical stream of events\n  Partition: unit of parallelism; ordered within partition\n  Consumer Group: each partition consumed by ONE member of the group\n  Offset: position in partition; consumers commit after processing\n  Retention: messages kept N days regardless of consumption (replay!)\n\nAt-least-once: re-deliver on failure → consumer must be idempotent\nExactly-once: two-phase commit / transactional API → higher latency\n\nKafka vs RabbitMQ:\n  Kafka: fan-out to many consumers, replay, high throughput, audit log\n  RabbitMQ: complex routing, per-message TTL, priority queues, simpler\n\nUse Kafka for: decouple producers/consumers, event sourcing, CDC, analytics pipelines.',
code:'// Partition parallelism:\n// 3 partitions → 3 consumers max per group\n// Consumer commits offset after processing:\n//   consumer.commitSync()\n// Idempotency: use message key as dedup key\n//   if (processed.contains(msgId)) return;\n//   process(msg);\n//   processed.add(msgId);',loci:null},
{id:'sd06',title:'6. CAP Theorem & Consistency Models',
q:'CAP: which two properties can you guarantee during a network partition?\nWhat is the difference between CP and AP systems?',
hint:'You always need P (partition tolerance). So you choose CP (consistent but may reject requests) or AP (available but may return stale data).',
answer:'CAP: during a network partition, choose C or A (P is mandatory).\n\nCP (Consistency + Partition tolerance):\n  Rejects requests if can\'t guarantee freshness\n  Use: bank balance, inventory, distributed locks\n  Examples: Zookeeper, HBase\n\nAP (Availability + Partition tolerance):\n  Returns possibly stale data\n  Use: social feed, user profile, shopping cart\n  Examples: Cassandra, DynamoDB (default), CouchDB\n\nConsistency models (weakest → strongest):\n  Eventual → reads may be stale\n  Read-your-writes → see your own writes\n  Monotonic reads → no going backwards\n  Causal → related writes in order\n  Strong/Linearizable → always latest write (quorum)\n\nPACELC: even without partition: Latency vs Consistency trade-off.',
code:'// Replication approaches:\n// Leader-follower: single writer, multiple readers\n//   → failover needed on leader death\n// Multi-leader: multiple writers, conflict resolution\n//   → last-write-wins, CRDTs, manual merge\n// Leaderless (Dynamo): quorum W+R > N\n//   → highly available, possible stale reads',loci:null},
{id:'sd07',title:'7. Design: Uber Ride Dispatch',
q:'Design Uber\'s ride dispatch. What data store holds driver locations?\nWhat is H3? How does the matching engine work?',
hint:'Redis GEO or H3 hexagonal cells for locations. H3 ring expansion for nearby driver search. ETA scoring for final match.',
answer:'Scale: 1M concurrent drivers × 1 update/4s = 250K writes/sec\n\nArchitecture:\n  Driver → WebSocket → Location Service → Kafka → Redis H3 index\n  Rider → Dispatch Service → Matching Engine → Driver WebSocket\n\nH3 Hexagonal Cells (Uber\'s approach):\n  World → hex cells at multiple resolutions (res 9 ≈ 0.1 km²)\n  Each driver stored in their current H3 cell in Redis\n  Search: target cell + 6 neighbors (ring-1 expansion)\n  Advantage over geohash: equal area, no edge distortion, clean ring queries\n\nMatching Engine:\n  1. Query available drivers in H3 ring-1 (expand to ring-2 if empty)\n  2. Compute ETA from Maps API for candidates\n  3. Score: ETA_weight×ETA + rating_weight×rating\n  4. Offer to best driver (timeout 10s → next driver)\n\nDriver locations: Redis only (TTL 30s) + async checkpoint to Cassandra',
code:'// H3 lookup:\nh3_index = h3.latLngToCell(lat,lng,resolution=9)\nneighbors = h3.gridDisk(h3_index,k=1)  // 7 cells\navailable = Redis.SUNION(neighbors.map(c->"cell:"+c))\n\n// Redis GEO alternative:\nGEOADD drivers <lng> <lat> <driver_id>\nGEORADIUS drivers <lat> <lng> 2km ASC COUNT 20',loci:null},
{id:'sd08',title:'8. Design: News Feed (Fan-out)',
q:'Fan-out on Write vs Fan-out on Read — trade-offs?\nWhat is the hybrid approach for celebrities?',
hint:'Write=pre-compute (fast read, expensive write). Read=compute at query time (slow read, cheap write). Hybrid: fan-out on write for normal users, fan-out on read for celebrities.',
answer:'Fan-out on Write (push):\n  On post: write post_id to all followers\' feed cache\n  Read: O(1) — pre-computed\n  Write: O(N followers) — expensive for 10M-follower celebrities\n\nFan-out on Read (pull):\n  On feed load: fetch from all followees, merge\n  Read: O(N followees) — slow\n  Write: O(1)\n\nHybrid (real solution):\n  if followers < 5000: fan-out on write\n  if celebrity: fan-out on read (merge celebrity posts at read time)\n\nData model:\n  Redis Sorted Set: ZADD user_feed:{uid} <timestamp> <post_id>\n  ZREVRANGE user_feed:123 0 49  ← latest 50 posts\n\nPagination: cursor (last post_id + timestamp) not OFFSET.',
code:'// Post flow:\nif(poster.followerCount < 5000){\n    // fan-out on write\n    for(Long followerId : followers){\n        redis.zadd("feed:"+followerId, now, postId);\n    }\n} else {\n    // celebrity: skip fan-out, flagged for read-time merge\n    db.save(post);\n}',loci:null},
{id:'sd09',title:'9. Design: Rate Limiter',
q:'What are the 5 rate limiting algorithms? Which is Uber\'s choice?\nHow do you make it distributed (multiple API servers)?',
hint:'Token Bucket: refill at rate R, consume 1 per request. Redis + Lua script for atomic check-and-decrement across servers.',
answer:'Algorithms:\n  Fixed Window: simple, burst at boundary (2× rate possible)\n  Sliding Window Log: accurate, high memory\n  Sliding Window Counter: accurate, O(1)\n  Token Bucket: allows bursts, smooth (Uber\'s choice)\n  Leaky Bucket: smooth output, drops bursts\n\nToken Bucket:\n  tokens += (now - last_refill) × rate\n  if tokens >= 1: allow, tokens--\n  else: reject 429\n\nDistributed (Redis):\n  Key: rate:{userId}:{window}\n  Lua script (atomic check-and-increment):\n    GET current → if over limit: reject\n    INCR key; EXPIRE key window\n\nFail open (allow all) vs fail closed (reject all) if Redis down.\n  Usually fail open → availability over strict limiting.',
code:'// Redis Lua (atomic):\nlocal cur=redis.call("GET",KEYS[1])\nif cur and tonumber(cur)>=tonumber(ARGV[1]) then\n  return 0  -- reject\nelse\n  redis.call("INCR",KEYS[1])\n  redis.call("EXPIRE",KEYS[1],ARGV[2])\n  return 1  -- allow\nend',loci:null},
{id:'sd10',title:'10. Trade-off Cheat Sheet',
q:'SQL vs NoSQL — choose SQL when?\nWebSocket vs REST — when to use WebSocket?\nKafka vs RabbitMQ — when Kafka?',
hint:'SQL: ACID, joins. WebSocket: real-time bidirectional. Kafka: fan-out, replay, high throughput.',
answer:'SQL vs NoSQL: SQL when ACID, complex queries, joins.\nCache invalidation: TTL when writes are infrequent; event-driven when write-heavy.\nFan-out: write-time when most users have few followers.\nConsistency: strong when money/inventory; eventual for social feeds.\nTransport: HTTP REST for request-response; WebSocket for real-time bidirectional.\nQueue: Kafka for fan-out, replay, high throughput; RabbitMQ for complex routing.\nStorage: SQL DB for structured; Blob (S3) for unstructured/large files.\nLocation index: Geohash for simple range; H3 (Uber) for uniform area, ring queries.\n\nUber-specific:\n  Geospatial: H3 hexagonal cells\n  Location: WebSocket + Kafka → Redis (hot) + Cassandra (cold)\n  Matching: H3 ring expansion + ETA scoring\n  Surge: supply/demand per H3 cell, event-driven, WebSocket push',
code:'// Availability math:\n// 99.9% = 8.7 hrs/year downtime\n// 99.99% = 52 min/year\n// 99.999% = 5.25 min/year\n//\n// Replication lag: async ≈ ms; sync = higher latency\n// Read replicas: good for reads; writes still go to leader\n// Sharding: distributes writes; makes joins hard',loci:null}
]});

{id:'lld01',title:'1. In-Memory File System (Terminal)',
q:'Design mkdir, cd, ls, pwd, search(regex) on an in-memory file system.\nWhat is the core data structure? What does Node contain?',
hint:'N-ary tree of Node objects. Node: name, isFile, parent pointer, Map<String,Node> children. FileSystem owns root + current pointer.',
answer:'Data structure: N-ary tree.\n  Node: name, isFile, content, parent, Map<String,Node> children\n  FileSystem: root node, current node\n\npwd: walk parent pointers to root, collect names, join with "/"\nmkdir: split path on "/", walk/create nodes. computeIfAbsent for each segment.\ncd: resolvePath → update current pointer. Errors: not found, is a file.\nls: list children of target dir, sorted alphabetically, prefix [DIR]/[FILE].\nsearch(regex): DFS from current, Pattern.compile, match child names.\n\nresolvePath: start from root if "/" prefix, else from current.\n  ".." → node.parent (root.parent = root)\n  "." → skip\n\nAll commands return String: "" on success, error message on failure.',
code:'class Node{\n    String name;boolean isFile;\n    Node parent;Map<String,Node> ch=new HashMap<>();\n    Node(String n,boolean f,Node p){name=n;isFile=f;parent=p;}\n}\nclass FileSystem{\n    Node root=new Node("/",false,null),cur;\n    FileSystem(){root.parent=root;cur=root;}\n\n    String pwd(){\n        if(cur==root)return"/";\n        Deque<String> p=new ArrayDeque<>();\n        for(Node n=cur;n!=root;n=n.parent)p.push(n.name);\n        return"/"+String.join("/",p);\n    }\n    Node resolve(String path){\n        Node b=path.startsWith("/")?root:cur;\n        for(String s:path.split("/")){\n            if(s.isEmpty()||s.equals("."))continue;\n            if(s.equals("..")){b=b.parent;continue;}\n            if(!b.ch.containsKey(s))return null;\n            b=b.ch.get(s);}\n        return b;\n    }\n    String mkdir(String path){\n        Node b=path.startsWith("/")?root:cur;\n        for(String s:path.split("/")){\n            if(s.isEmpty()||s.equals("."))continue;\n            if(s.equals("..")){b=b.parent;continue;}\n            final Node par=b;\n            b.ch.computeIfAbsent(s,k->new Node(k,false,par));\n            b=b.ch.get(s);}\n        return"";\n    }\n    String cd(String path){\n        Node t=resolve(path);\n        if(t==null)return"No such file: "+path;\n        if(t.isFile)return"Not a dir: "+path;\n        cur=t;return"";\n    }\n    String ls(String path){\n        Node t=path.isEmpty()?cur:resolve(path);\n        List<String> names=new ArrayList<>(t.ch.keySet());\n        Collections.sort(names);\n        StringBuilder sb=new StringBuilder();\n        for(String nm:names){\n            if(sb.length()>0)sb.append("\\n");\n            Node c=t.ch.get(nm);\n            sb.append(c.isFile?"[FILE] ":"[DIR] ").append(nm);}\n        return sb.toString();\n    }\n    String search(String regex){\n        List<String> res=new ArrayList<>();\n        dfs(cur,Pattern.compile(regex),res,pwd());\n        Collections.sort(res);\n        return res.isEmpty()?"No matches":String.join("\\n",res);\n    }\n    void dfs(Node n,Pattern p,List<String> r,String path){\n        for(Node c:n.ch.values()){\n            String cp=path.equals("/")?"/"+c.name:path+"/"+c.name;\n            if(p.matcher(c.name).find())r.add(cp);\n            if(!c.isFile)dfs(c,p,r,cp);}}\n}',loci:null},
{id:'lld02',title:'2. LRU Cache',
q:'Design an O(1) get/put LRU Cache.\nWhich two data structures combine to achieve O(1)?',
hint:'HashMap (key → node) + Doubly Linked List (access order). Head = MRU, Tail = LRU. On access: remove node and move to head. On eviction: remove tail.',
answer:'HashMap<key, DLL Node> + Doubly Linked List.\n  Head ← MRU end, Tail ← LRU end.\n\nget(key):\n  if not in map: return -1\n  move node to head (remove + addToHead)\n  return node.value\n\nput(key, value):\n  if key exists: update value, move to head\n  else:\n    create new node, add to head, put in map\n    if size > capacity: remove tail node, remove from map\n\nDLL operations (all O(1)):\n  addToHead: insert after dummy head\n  removeNode: update prev/next pointers\n  removeTail: return node before dummy tail\n\nJava shortcut: LinkedHashMap with accessOrder=true.',
code:'class LRUCache{\n    class Node{int key,val;Node prev,next;\n        Node(int k,int v){key=k;val=v;}}\n    int cap;\n    Map<Integer,Node> map=new HashMap<>();\n    Node head=new Node(0,0),tail=new Node(0,0);\n    LRUCache(int cap){this.cap=cap;head.next=tail;tail.prev=head;}\n\n    private void addHead(Node n){\n        n.next=head.next;n.prev=head;\n        head.next.prev=n;head.next=n;\n    }\n    private void remove(Node n){\n        n.prev.next=n.next;n.next.prev=n.prev;\n    }\n    private Node removeTail(){Node n=tail.prev;remove(n);return n;}\n\n    public int get(int key){\n        if(!map.containsKey(key))return -1;\n        Node n=map.get(key);remove(n);addHead(n);return n.val;\n    }\n    public void put(int key,int val){\n        if(map.containsKey(key))remove(map.get(key));\n        Node n=new Node(key,val);addHead(n);map.put(key,n);\n        if(map.size()>cap){Node t=removeTail();map.remove(t.key);}\n    }\n}',loci:null},
{id:'lld03',title:'3. Parking Lot',
q:'Design a Parking Lot supporting multiple levels, vehicle sizes, and ticket-based pricing.\nWhat are the key classes?',
hint:'ParkingLot → Level[] → Spot[]. Spot has SpotType (SMALL/MEDIUM/LARGE). Vehicle has VehicleType. Ticket stores entry time + spot. ParkingLot.park() finds nearest available spot.',
answer:'Classes:\n  Vehicle (abstract): licensePlate, VehicleType\n  Car / Motorcycle / Truck (extends Vehicle)\n  SpotType: MOTORCYCLE, COMPACT, LARGE\n  ParkingSpot: spotType, isOccupied, Vehicle\n  Level: List<ParkingSpot>, floor number\n  Ticket: Vehicle, ParkingSpot, entryTime\n  ParkingLot: Level[], park(vehicle), unpark(ticket), calculateFee(ticket)\n\npark(vehicle):\n  for each level: find first available spot matching vehicle size\n  create Ticket(vehicle, spot, now)\n  mark spot occupied\n\nunpark(ticket):\n  mark spot free\n  fee = (now - entryTime) * hourlyRate\n\nSizing rule: Motorcycle fits MOTORCYCLE/COMPACT/LARGE. Car fits COMPACT/LARGE. Truck fits LARGE only.\n\nThread safety: synchronized on spot reservation if multi-threaded.',
code:'enum SpotType { MOTORCYCLE, COMPACT, LARGE }\nclass ParkingSpot {\n    SpotType type; boolean occupied; Vehicle vehicle;\n    boolean canFit(Vehicle v){\n        return type.ordinal()>=v.getRequiredSpot().ordinal();\n    }\n}\nclass ParkingLot {\n    List<Level> levels;\n    Ticket park(Vehicle v){\n        for(Level l:levels)\n            for(ParkingSpot s:l.spots)\n                if(!s.occupied&&s.canFit(v)){\n                    s.occupied=true; s.vehicle=v;\n                    return new Ticket(v,s,Instant.now());\n                }\n        return null; // full\n    }\n}',loci:null},
{id:'lld04',title:'4. Elevator System',
q:'Design an elevator controller for a building with N elevators.\nHow do you pick which elevator to send? What states does an elevator have?',
hint:'ElevatorState: IDLE, MOVING_UP, MOVING_DOWN. Dispatcher uses SCAN (look) algorithm: serve requests in current direction of travel, reverse when no more in that direction.',
answer:'Classes:\n  Elevator: id, currentFloor, direction, ElevatorState, TreeSet<Integer> upQueue, downQueue\n  ElevatorController: List<Elevator>, requestElevator(floor, direction)\n  Request: floor, direction (UP/DOWN)\n\nSCAN (Look) algorithm (like disk scheduling):\n  If moving UP: serve all floors > currentFloor in upQueue, then switch to DOWN\n  If moving DOWN: serve all floors < currentFloor in downQueue, then switch to UP\n  IDLE: pick direction based on pending requests\n\nDispatcher: pick elevator with minimum estimated wait time.\n  cost = |elevator.currentFloor - requestFloor| + penalty if direction mismatch\n\nStep simulation:\n  Each tick: elevator moves ±1 floor, opens door if floor in queue, removes from queue.\n\nFor interviews: simpler approach — nearest idle elevator, or round-robin.',
code:'class Elevator {\n    int id, floor;\n    Direction dir=Direction.IDLE;\n    TreeSet<Integer> stops=new TreeSet<>();\n    void addStop(int f){stops.add(f);}\n    void step(){\n        if(stops.isEmpty()){dir=Direction.IDLE;return;}\n        if(dir==Direction.UP||dir==Direction.IDLE){\n            Integer next=stops.ceiling(floor+1);\n            if(next!=null){floor++;if(floor==next)stops.remove(next);}\n            else dir=Direction.DOWN;\n        } else {\n            Integer next=stops.floor(floor-1);\n            if(next!=null){floor--;if(floor==next)stops.remove(next);}\n            else dir=Direction.UP;\n        }\n    }\n}',loci:null},
{id:'lld05',title:'5. Vending Machine',
q:'Design a Vending Machine with states: IDLE, COIN_INSERTED, DISPENSING.\nHow do you model the state transitions cleanly?',
hint:'State pattern: each state is an object with methods (insertCoin, selectProduct, cancel). Machine delegates to current state. Transitions update machine.setState().',
answer:'States: IDLE → COIN_INSERTED → DISPENSING → IDLE\n\nState pattern:\n  interface VendingState { insertCoin(int); selectProduct(String); cancel(); }\n  IdleState: insertCoin → switch to CoinInsertedState\n  CoinInsertedState: selectProduct → check stock/balance → switch to Dispensing; cancel → refund\n  DispensingState: dispense item → switch to Idle\n\nVendingMachine:\n  Map<String, Item> inventory (name → Item{price, quantity})\n  int balance (coins inserted so far)\n  VendingState currentState\n\nAlternative (without State pattern):\n  enum + switch — simpler for small state machines\n\nEdge cases: insufficient balance, out of stock, exact change only.',
code:'interface VendingState{\n    void insertCoin(int cents);\n    void selectProduct(String code);\n    void cancel();\n}\nclass CoinInsertedState implements VendingState {\n    VendingMachine m;\n    public void selectProduct(String code){\n        Item item=m.inventory.get(code);\n        if(item==null){System.out.println("Invalid");return;}\n        if(m.balance<item.price){System.out.println("Add more coins");return;}\n        if(item.qty==0){System.out.println("Out of stock");return;}\n        item.qty--; m.balance-=item.price;\n        m.dispense(item); m.setState(new IdleState(m));\n    }\n}',loci:null},
{id:'lld06',title:'6. Ride Sharing (Uber LLD)',
q:'Design the core objects for a ride-sharing system.\nWhat are the key classes and their relationships?',
hint:'User(Rider/Driver), Trip, Location, TripStatus enum. RideService: requestRide, acceptRide, completeRide. MatchingService: finds nearest driver.',
answer:'Classes:\n  User: id, name, phone\n  Rider extends User: List<Trip> history\n  Driver extends User: Vehicle, DriverStatus (AVAILABLE/ON_TRIP/OFFLINE), Location\n  Vehicle: plateNumber, VehicleType, model\n  Location: lat, lng\n  Trip: id, Rider, Driver, pickup, destination, TripStatus, fare, startTime, endTime\n  TripStatus: REQUESTED, ACCEPTED, IN_PROGRESS, COMPLETED, CANCELLED\n\nServices:\n  RideService:\n    requestRide(rider, pickup, dest) → creates Trip(REQUESTED)\n    acceptRide(driver, tripId) → Trip→ACCEPTED, driver→ON_TRIP\n    startTrip(tripId) → Trip→IN_PROGRESS\n    completeTrip(tripId) → Trip→COMPLETED, calcFare, driver→AVAILABLE\n    cancelTrip(tripId) → Trip→CANCELLED\n\n  MatchingService:\n    findNearestDriver(pickup) → list drivers by distance, filter AVAILABLE\n\n  FareCalculator:\n    baseFare + (distance × perKmRate) + (duration × perMinRate) × surgeMultiplier',
code:'class Trip {\n    String id; Rider rider; Driver driver;\n    Location pickup, destination;\n    TripStatus status; double fare;\n    Instant startTime, endTime;\n}\nclass RideService {\n    Map<String,Trip> trips=new HashMap<>();\n    Trip requestRide(Rider r, Location pickup, Location dest){\n        Trip t=new Trip(UUID.randomUUID(),r,pickup,dest);\n        t.status=TripStatus.REQUESTED;\n        trips.put(t.id,t);\n        Driver d=matchingService.findNearest(pickup);\n        if(d!=null) offerTrip(d,t);\n        return t;\n    }\n}',loci:null},
{id:'lld07',title:'7. Snake and Ladder / Board Game',
q:'Design a Snake and Ladder game.\nWhat is the clean way to model snakes/ladders so the move logic stays simple?',
hint:'Map<int,int> portals where key=start, value=end. If end>start it\'s a ladder, if end<start it\'s a snake. After each dice roll: newPos = portals.getOrDefault(newPos, newPos).',
answer:'Classes:\n  Board: size (e.g. 100), Map<Integer,Integer> portals\n  Player: name, currentPosition\n  Dice: roll() → random 1-6\n  Game: Board, List<Player>, currentPlayerIndex\n\nGame loop:\n  while no winner:\n    player = players[currentIndex]\n    roll = dice.roll()\n    newPos = player.pos + roll\n    if newPos > board.size: skip (or stay)\n    newPos = board.portals.getOrDefault(newPos, newPos)  ← handles both snakes and ladders\n    player.pos = newPos\n    if player.pos == board.size: player wins!\n    advance currentIndex\n\nBoard setup:\n  ladders: {4→14, 9→31, 20→38, ...}\n  snakes: {17→7, 54→34, 62→19, ...}\n  merge into single portals map',
code:'class Board {\n    int size;\n    Map<Integer,Integer> portals=new HashMap<>();\n    int move(int from, int steps){\n        int newPos=from+steps;\n        if(newPos>size) return from;\n        return portals.getOrDefault(newPos,newPos);\n    }\n}\nclass Game {\n    void play(){\n        while(true){\n            Player p=players.get(current%players.size());\n            int steps=dice.roll();\n            p.pos=board.move(p.pos,steps);\n            System.out.println(p.name+" → "+p.pos);\n            if(p.pos==board.size){System.out.println(p.name+" wins!");break;}\n            current++;\n        }\n    }\n}',loci:null},
{id:'lld08',title:'8. LLD Interview Approach',
q:'What are the 5 steps to solve any LLD problem in an interview?\nWhat should you clarify before drawing classes?',
hint:'Clarify → Use Cases → Core Classes → Relationships → Patterns. Ask: read/write ratio, concurrency needed, scale, must-have vs nice-to-have features.',
answer:'5-step approach:\n\n1. Clarify requirements (2 min)\n   - What are the core use cases? (3-5 only)\n   - Single user or multi-user? Thread-safe?\n   - Any scale considerations? (usually in-memory is fine)\n\n2. Identify entities / nouns (2 min)\n   - Nouns from use cases → candidate classes\n   - Verbs → candidate methods\n\n3. Define relationships (3 min)\n   - IS-A (inheritance) vs HAS-A (composition)\n   - One-to-many, many-to-many associations\n   - Identify which class owns which\n\n4. Define interfaces and key methods (5 min)\n   - Write method signatures before implementation\n   - Return types, parameters, exceptions\n\n5. Apply patterns if needed (5 min)\n   - State machine → State pattern\n   - Swappable algorithm → Strategy\n   - Notify many → Observer\n   - Build complex object → Builder\n\nRed flags to avoid:\n  - God classes that do everything\n   - String-typed enums (use enum)\n   - Missing null checks at boundaries',
code:'// Template for any LLD:\n// 1. Enums first (types, statuses)\nenum Status { REQUESTED, ACTIVE, DONE, CANCELLED }\n// 2. Value objects (immutable data)\nrecord Location(double lat, double lng) {}\n// 3. Entities (have identity + state)\nclass Order { String id; Status status; ... }\n// 4. Services (orchestrate entities)\nclass OrderService { Order create(...); void update(...); }\n// 5. Repository (storage abstraction)\ninterface OrderRepo { void save(Order o); Order findById(String id); }',loci:null}
